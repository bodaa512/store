<div class="container py-5" *ngIf="product">
  <button class="btn btn-outline-secondary mb-4 rounded-pill px-4" routerLink="/store">
    <i class="bi bi-arrow-left me-2"></i> Back to Store
  </button>

  <div class="row align-items-center">
    <div class="col-md-6 mb-4">
      <div class="premium-card p-4 overflow-hidden d-flex justify-content-center align-items-center" style="height: 450px;">
        <img [src]="product.imgURL" class="w-100 h-100" style="object-fit:contain;">
      </div>
    </div>

    <div class="col-md-6">
      <h1 class="display-5 fw-bolder mb-3">{{product.name}}</h1>
      <h2 class="text-primary mb-4 fw-bold">{{product.price | currency:'USD'}}</h2>
      
      <div class="mb-4">
        <span class="badge bg-light border text-dark fs-6 px-3 py-2 me-3 rounded-pill">
          <i class="bi bi-box me-2"></i> Stock: {{product.quantity}}
        </span>
        <span class="badge bg-light border text-muted fs-6 px-3 py-2 rounded-pill">
          <i class="bi bi-calendar me-2"></i> Date: {{product.purchaseDate | date:'mediumDate'}}
        </span>
      </div>

      <p class="lead text-muted mb-5">
        Experience the cutting edge of technology and exceptional quality. This product comes with full warranty and fast shipping.
      </p>

      <button class="btn btn-premium btn-lg w-100 py-3 shadow-lg fs-5" 
              (click)="addToCart(product)"
              [disabled]="product.quantity === 0"
              [ngClass]="{'btn-secondary': product.quantity === 0}">
        <i class="bi" [ngClass]="product.quantity > 0 ? 'bi-cart-plus' : 'bi-x-circle'"></i> 
        {{ product.quantity > 0 ? 'Add to Cart' : 'Out of Stock' }}
      </button>
    </div>
  </div>
</div>
