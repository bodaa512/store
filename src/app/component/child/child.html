<div class="row g-4 mb-5">
  <div class="col-12 dflex flex-column mb-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 text-dark fw-bold">Available Products</h4>
      <span class="badge bg-primary rounded-pill px-3 py-2">{{filteredProducts.length}} Items</span>
    </div>
    
    <!-- Category Pills -->
    <div class="d-flex gap-2 flex-wrap">
      <button *ngFor="let cat of categories" 
              class="btn rounded-pill px-4" 
              [ngClass]="selectedCategory === cat.id ? 'btn-primary' : 'btn-outline-secondary'"
              (click)="setCategory(cat.id)">
        {{cat.name}}
      </button>
    </div>
  </div>

  @for (p of filteredProducts; track p.id) {
  <div class="col-md-4 col-sm-6">
    <div class="premium-card h-100 position-relative" appProductCard>
      
      <!-- Image Wrapper with nice background -->
      <div class="bg-light p-0 text-center position-relative overflow-hidden d-flex justify-content-center align-items-center" style="border-bottom: 1px solid rgba(0,0,0,0.05); height: 200px; border-radius: 1rem 1rem 0 0;">
        <img [src]="p.imgURL" loading="lazy" class="img-fluid w-100 h-100" style="object-fit:contain; padding: 1rem; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
      </div>

      <!-- Card Body Content -->
      <div class="card-body p-4 d-flex flex-column">
        
        <div class="d-flex justify-content-between align-items-start mb-2">
          <h5 class="fw-bold text-dark mb-0 text-truncate pe-2" [title]="p.name">{{p.name}}</h5>
          <span class="badge bg-success-subtle text-success fs-6 px-2 py-1 rounded">{{p.price | currency:'USD'}}</span>
        </div>

        <p class="text-muted small mb-4">
          <i class="bi bi-calendar-check me-1"></i> Added: {{p.purchaseDate | date:'mediumDate'}}
        </p>

        <!-- Actions -->
        <div class="mt-auto d-flex gap-2">
          <button class="btn btn-premium w-100 py-2 fw-medium shadow-sm mt-auto" 
                (click)="addToCart(p)" 
                [disabled]="p.quantity === 0"
                [ngClass]="{'btn-secondary': p.quantity === 0}">
          <i class="bi bi-cart-plus me-2" *ngIf="p.quantity > 0"></i> 
          <i class="bi bi-x-circle me-2" *ngIf="p.quantity === 0"></i>
          {{ p.quantity > 0 ? 'Add to Cart' : 'Out of Stock' }}
        </button>
          <button class="btn btn-outline-secondary rounded-pill px-3" [routerLink]="['/products', p.id]" title="View Details">
            <i class="bi bi-eye text-dark"></i>
          </button>
        </div>

      </div>
    </div>
  </div>
  } @empty {
  <div class="col-12">
    <div class="alert alert-light text-center border p-5 rounded-4 premium-card">
      <i class="bi bi-box-seam display-1 text-muted mb-3"></i>
      <h4 class="fw-bold">No Products Found</h4>
      <p class="text-muted mb-0">Try adjusting your search criteria or the product ID.</p>
    </div>
  </div>
  }
</div>
